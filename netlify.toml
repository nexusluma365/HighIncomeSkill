[build]
  command = "PORT=5173 BASE_PATH=/ pnpm --filter @workspace/skill-funnel run build"
  publish = "artifacts/skill-funnel/dist/public"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://js.stripe.com https://m.stripe.network; script-src-elem 'self' 'unsafe-inline' blob: https://js.stripe.com https://m.stripe.network; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://js.stripe.com https://m.stripe.network; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.stripe.com https://js.stripe.com https://m.stripe.network https://r.stripe.com https://script.google.com https://script.googleusercontent.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://m.stripe.network; worker-src 'self' blob:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
